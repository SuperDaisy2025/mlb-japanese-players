<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#070b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MLB日本人選手</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg: #070b14;
  --bg2: #0d1526;
  --bg3: #131e33;
  --bg4: #1a2740;
  --border: #1e2d45;
  --border2: #2a3e5a;
  --txt: #e8eef8;
  --txt2: #8ba3be;
  --txt3: #4a6278;
  --red: #ef4444;
  --blue: #3b82f6;
  --gold: #f59e0b;
  --green: #22c55e;
  --teal: #06b6d4;
  --r: 8px;
  --rlg: 12px;
}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;min-height:100dvh;overflow-x:hidden;font-size:14px}

/* ── Header ── */
.app-header{position:sticky;top:0;z-index:100;background:rgba(7,11,20,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px}
.app-logo{display:flex;align-items:center;gap:8px}
.logo-box{background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;padding:4px 8px;border-radius:6px;letter-spacing:.5px}
.app-title-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;line-height:1.1}
.app-version{font-size:10px;color:var(--txt3);font-weight:600;letter-spacing:.5px}
.header-right{display:flex;align-items:center;gap:8px}
#last-updated{font-size:11px;color:var(--txt3)}
.btn-refresh{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;color:var(--txt);font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.btn-refresh:hover{background:var(--bg4);border-color:var(--blue)}
.btn-refresh:disabled{opacity:.5;cursor:not-allowed}
#langBtn{width:34px;height:34px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--txt2);font-size:11px;font-weight:700;cursor:pointer;transition:.2s}
#langBtn:hover{color:var(--txt);border-color:var(--blue)}

/* ── Tabs ── */
.tab-nav{display:flex}
.tab-btn{flex:1;padding:9px 4px;background:none;border:none;border-bottom:3px solid transparent;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:.2s}
.tab-btn:hover{color:var(--txt)}
.tab-btn.active{color:var(--txt);border-bottom-color:var(--red)}

/* ── Main ── */
.app-content{max-width:1100px;margin:0 auto;padding-bottom:40px}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── Period selector ── */
.period-selector{display:flex;gap:6px;padding:14px 14px 0}
.period-btn{padding:5px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--txt2);font-size:12px;font-weight:700;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px;cursor:pointer;transition:.2s}
.period-btn:hover{color:var(--txt)}
.period-btn.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Player filter ── */
.player-filter{padding:10px 14px 0}
.pf-label{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.pf-chips{display:flex;flex-wrap:wrap;gap:6px}
.pf-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:.2s;user-select:none}
.pf-chip input{display:none}
.pf-chip:hover{border-color:var(--border2)}
.pf-chip.active{background:var(--bg4);border-color:var(--blue);color:#fff}
.pf-logo{width:18px;height:18px;object-fit:contain}

/* ── Stats cards ── */
.stats-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;padding:12px 14px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rlg);padding:12px;cursor:pointer;transition:.2s;position:relative}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);border-radius:var(--rlg) var(--rlg) 0 0;transition:.2s}
.stat-card:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-1px)}
.stat-card.leader::before{background:var(--gold)}
.stat-card.leader{border-color:rgba(245,158,11,.3)}

.stat-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.team-logo-wrap{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.team-logo-sm{width:32px;height:32px;object-fit:contain}
.stat-card-name{flex:1;min-width:0}
.name-ja{font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:700;line-height:1.2}
.name-en{font-size:12px;color:var(--txt2);margin-top:2px}

.stat-card-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mini-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.mini-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;line-height:1}
.mini-lbl{font-size:11px;color:var(--txt2);font-weight:600}

/* ── Charts ── */
.batting-charts-section,.pitching-charts-section{padding:0 14px}
.chart-block{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rlg);padding:14px;margin-bottom:14px}
.chart-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chart-badge{font-size:11px;font-weight:500;color:var(--txt2);background:var(--bg2);padding:2px 8px;border-radius:10px}
.chart-wrap{height:240px;position:relative}

/* ── Section headings ── */
.section-heading{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);padding:14px 14px 6px}

/* ── Player select grid ── */
.player-select-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:0 14px 8px}
.player-select-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--accent,var(--blue));border-radius:var(--rlg);padding:12px 10px;cursor:pointer;transition:.2s;text-align:center}
.player-select-card:hover{background:var(--bg4);transform:translateY(-2px)}
.psc-logo{width:36px;height:36px;object-fit:contain;margin-bottom:4px}
.psc-number{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--accent,var(--blue));line-height:1}
.psc-ja{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;margin-top:2px}
.psc-en{font-size:11px;color:var(--txt2);margin-top:1px}
.psc-meta{font-size:11px;color:var(--txt3);margin-top:3px;font-weight:500}

/* ── Player detail ── */
.player-detail{padding:0}
.player-detail-header{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border-bottom:1px solid var(--border)}
.back-btn{background:none;border:1px solid var(--border);border-radius:var(--r);color:var(--txt2);padding:5px 10px;font-size:13px;cursor:pointer;transition:.2s;white-space:nowrap}
.back-btn:hover{color:var(--txt);border-color:var(--border2)}
.team-logo-md{width:40px;height:40px;object-fit:contain}
.player-detail-ja{font-family:'Noto Sans JP',sans-serif;font-size:17px;font-weight:700}
.player-detail-en{font-size:12px;color:var(--txt2);margin-top:2px}

/* ── Subtabs ── */
.player-subtabs{display:flex;border-bottom:1px solid var(--border);padding:0 14px;background:var(--bg)}
.subtab-btn{padding:9px 16px;background:none;border:none;border-bottom:2px solid transparent;color:var(--txt2);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.2s}
.subtab-btn:hover{color:var(--txt)}
.subtab-btn.active{color:var(--txt);border-bottom-color:var(--teal)}

/* ── Summary ── */
.summary-outer{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;padding:14px}
.summary-section{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rlg);padding:14px}
.summary-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.summary-grid-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.sr-item{display:flex;flex-direction:column;padding:7px 8px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.sr-item:nth-child(3n){border-right:none}
.sr-item:nth-last-child(-n+3){border-bottom:none}
.sr-lbl{font-size:11px;color:var(--txt2);font-weight:600;margin-bottom:2px}
.sr-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;line-height:1}

.statcast-section{margin:0 14px 14px;background:linear-gradient(135deg,var(--bg3),rgba(59,130,246,.1));border:1px solid rgba(59,130,246,.3);border-radius:var(--rlg);padding:14px}
.badge-sc{font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:2px 8px;border-radius:10px}
.statcast-note{font-size:12px;color:var(--txt2);margin:6px 0}
.btn-secondary{padding:7px 14px;background:var(--blue);border:none;border-radius:var(--r);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;margin-top:8px}
.btn-secondary:hover{opacity:.85}

/* ── Game log ── */
.game-log{padding:14px;display:flex;flex-direction:column;gap:2px}
.game-log-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.15s;font-size:13px;min-height:38px}
.game-log-row:hover{background:var(--bg4)}
.gl-date{color:var(--txt2);min-width:40px;font-size:12px;font-weight:600}
.gl-ha{font-size:13px;min-width:22px}
.gl-opp{flex:1;font-family:'Noto Sans JP',sans-serif;font-size:12px;min-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gl-stat{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;min-width:38px;text-align:center}
.gl-avg{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--gold);min-width:44px;text-align:right}
.gl-ops{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--txt2);min-width:36px;text-align:right}
.gl-wl{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;min-width:24px;text-align:center}
.gl-wl.win{color:var(--green)}
.gl-wl.loss{color:var(--red)}
.gl-arrow{color:var(--txt3);font-size:10px;margin-left:auto;flex-shrink:0}

/* ── At-bat summary ── */
.game-atbats,.game-pitching{background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);margin-top:-2px}
.ab-summary-list{padding:6px 8px;display:flex;flex-direction:column;gap:2px}

.ab-summary-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;transition:.15s}
.ab-summary-row:hover{background:var(--bg4)}
.ab-idx{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--txt3);min-width:20px}
.ab-result-badge{font-weight:700;min-width:80px;font-size:13px}
.ab-count{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--txt2);min-width:30px}
.ab-pitcher-name{flex:1;color:var(--txt2);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ab-npitches{color:var(--txt3);font-size:11px;min-width:30px;text-align:right}
.ab-arrow{color:var(--txt3);font-size:10px;margin-left:4px}

.ab-detail-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;margin-top:-1px}
.pitch-table-header{display:grid;grid-template-columns:28px 1fr 75px 45px 1fr;padding:4px 10px;background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pitch-row{display:grid;grid-template-columns:28px 1fr 75px 45px 1fr;padding:5px 10px;border-top:1px solid var(--border);font-size:12px}
.pitch-row.last-pitch{background:rgba(239,68,68,.08)}
.pitch-desc{font-size:11px;color:var(--txt2)}

/* ── Pitch log ── */
.pitch-log-table{font-size:12px}
.pst-header{display:grid;grid-template-columns:32px 1fr 75px 1fr 40px 1fr;padding:5px 12px;background:var(--bg3);color:var(--txt3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.pst-row{display:grid;grid-template-columns:32px 1fr 75px 1fr 40px 1fr;padding:5px 12px;border-top:1px solid var(--border)}
.pst-row.final-pitch{background:rgba(59,130,246,.08)}
.batter-cell{font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pitch-outcome{font-size:11px}

/* ── Result colors ── */
.r-hr{color:var(--gold)}
.r-k{color:var(--red)}
.r-hit{color:var(--green)}
.r-walk{color:var(--teal)}
.r-out{color:var(--txt2)}

/* ── Loading ── */
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:36px auto}
.loading-spinner-sm{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:14px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
.error-msg{padding:20px;text-align:center;color:var(--red);font-size:13px}
.no-data,.no-data-sm{padding:14px;text-align:center;color:var(--txt3);font-size:13px}

/* ── At-bat results summary line ── */
.ab-results-line{padding:8px 12px;font-size:13px;font-weight:600;color:var(--txt2);background:var(--bg2);border-bottom:1px solid var(--border);letter-spacing:2px}

/* ── Ab detail inner layout ── */
.ab-detail-inner{display:flex;gap:0;align-items:flex-start}
.pitch-detail-left{flex:1;min-width:0}
.toggleAbDetail{cursor:pointer}

/* ── Pitch zone (3x3) ── */
.pitch-zone-wrap{padding:10px;flex-shrink:0}
.zone-label{font-size:10px;color:var(--txt3);text-align:center;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.pitch-zone{display:grid;grid-template-columns:repeat(3,36px);grid-template-rows:repeat(3,36px);gap:2px;border:2px solid var(--border2);border-radius:4px;padding:3px;background:var(--bg3)}
.zone-cell{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:2px;background:var(--bg2);border-radius:2px;font-size:9px}
.zone-dot{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;cursor:default}
.zone-dot.strike{background:rgba(239,68,68,.7);color:#fff}
.zone-dot.ball{background:rgba(59,130,246,.5);color:#fff}
.zone-dot.hit{background:rgba(245,158,11,.8);color:#000}

/* ── Pitching detail new layout ── */
.pitching-detail-wrap{padding:8px}
.pitching-detail-main{display:flex;gap:12px;align-items:flex-start}
.pitching-list-col{flex:1;min-width:0;max-height:600px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r)}
.pitching-zone-col{width:320px;flex-shrink:0;position:sticky;top:0}
.pitching-charts-col{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.pitching-charts-col .chart-block{margin:0}
.pitching-charts-col .chart-wrap{height:180px}

/* ── Zone sticky header ── */
.zone-sticky{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rlg);padding:12px}
.zone-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.5px;color:var(--txt2);margin-bottom:8px;text-transform:uppercase}
.zone-legend{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--txt2);margin-bottom:10px}
.zl-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:3px}
.zl-dot.strike{background:#ef4444}
.zl-dot.ball{background:#3b82f6}
.zl-dot.hit{background:#f59e0b}

/* ── Large pitch zone ── */
.pitch-zone-large{display:flex;flex-direction:column;gap:3px;width:100%}
.zone-col-headers{display:grid;grid-template-columns:28px repeat(3,1fr);gap:3px;font-size:10px;color:var(--txt3);text-align:center;font-weight:600;padding:0 2px}
.zone-large-row{display:grid;grid-template-columns:28px repeat(3,1fr);gap:3px}
.zone-row-label{font-size:9px;color:var(--txt3);font-weight:600;display:flex;align-items:center;justify-content:center}
.zone-large-cell{min-height:68px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:3px;padding:4px}
.zone-large-cell.zone-center{border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.03)}
.zone-dot-lg{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;cursor:pointer;transition:all .15s;border:2px solid transparent;line-height:1}
.zone-dot-lg.strike{background:#ef4444;color:#fff}
.zone-dot-lg.ball{background:#3b82f6;color:#fff}
.zone-dot-lg.hit{background:#f59e0b;color:#000}
.zone-dot-lg.zone-dot-dim{opacity:.18;transform:scale(.8)}
.zone-dot-lg.zone-dot-highlight{transform:scale(1.35);box-shadow:0 0 0 3px rgba(255,255,255,.7),0 0 8px rgba(255,255,255,.4);z-index:10;border-color:white}

/* ── Team standings ── */
.team-standings-section{padding:14px;margin-bottom:12px}
.standings-table{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rlg);overflow:hidden}
.standings-header{display:grid;grid-template-columns:80px 1fr 36px 36px 52px 36px;padding:7px 12px;background:var(--bg2);font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.standings-row{display:grid;grid-template-columns:80px 1fr 36px 36px 52px 36px;padding:7px 12px;border-top:1px solid var(--border);font-size:13px;transition:.15s}
.standings-row:hover{background:var(--bg4)}
.standings-row.my-team{background:rgba(59,130,246,.1);border-left:3px solid var(--blue)}
.standings-div{font-size:10px;color:var(--txt3);font-weight:600}
.standings-team{font-weight:500}
.standings-row.my-team .standings-team strong{color:var(--teal)}

/* ── Statcast & Settings buttons ── */
.btn-statcast{display:flex;align-items:center;gap:4px;padding:6px 12px;background:rgba(6,182,212,.15);border:1px solid rgba(6,182,212,.4);border-radius:20px;color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-statcast:hover{background:rgba(6,182,212,.25);border-color:var(--teal)}
.btn-statcast:disabled{opacity:.5;cursor:not-allowed}
.btn-settings{width:32px;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:50%;color:var(--txt2);font-size:14px;cursor:pointer;transition:.2s}
.btn-settings:hover{color:var(--txt);border-color:var(--border2)}

/* ── Team logo brightness (Padres logo is very dark) ── */
.team-logo-sm,.team-logo-md,.psc-logo,.pf-logo{filter:brightness(1.1)}
.logo-padres{filter:brightness(2.5) saturate(1.2) !important}

/* ── Game log: compact layout with ab results inline ── */
.game-log-row{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:.15s;font-size:12px;min-height:36px;flex-wrap:nowrap}
.game-log-row:hover{background:var(--bg4)}
.gl-date{color:var(--txt2);min-width:38px;font-size:11px;font-weight:600;flex-shrink:0}
.gl-ha{font-size:12px;min-width:18px;flex-shrink:0}
.gl-opp{min-width:100px;max-width:160px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.gl-score{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;min-width:44px;flex-shrink:0}
.gl-score-nd{color:var(--txt3)}
.gl-stat{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;min-width:32px;flex-shrink:0}
.gl-avg{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--gold);flex-shrink:0}
.gl-ops{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--txt2);flex-shrink:0}
.gl-ab-inline{flex:1;font-size:11px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:4px}
.gl-arrow{color:var(--txt3);font-size:10px;margin-left:auto;flex-shrink:0}
.gl-wl{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800}
.gl-wl.win{color:var(--green)}
.gl-wl.loss{color:var(--red)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200}
.modal-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rlg);padding:24px;z-index:201;width:min(480px,90vw)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;color:var(--txt)}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px;font-weight:600}
.modal-field input{width:100%;padding:8px 10px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--txt);font-size:13px;outline:none}
.modal-field input:focus{border-color:var(--teal)}
.modal-hint{font-size:11px;color:var(--txt3);margin-top:4px}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.btn-primary{padding:8px 18px;background:var(--teal);border:none;border-radius:var(--r);color:#000;font-size:13px;font-weight:700;cursor:pointer}
.btn-cancel{padding:8px 18px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);color:var(--txt2);font-size:13px;cursor:pointer}

/* ── At-bat results summary line ── */
.ab-results-line{padding:6px 12px;font-size:12px;font-weight:600;color:var(--txt2);background:var(--bg2);border-bottom:1px solid var(--border);letter-spacing:1px}
.gl-ab-results{display:none} /* now inline in row */

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-top">
    <div class="app-logo">
      <div class="logo-box">MLB</div>
      <div>
        <div class="app-title-text" data-i18n="appTitle">MLB日本人選手</div>
        <div class="app-version">v9</div>
      </div>
    </div>
    <div class="header-right">
      <span id="last-updated"></span>
      <button class="btn-statcast" id="statcast-btn" onclick="triggerGithubActions()" title="Statcast data via GitHub Actions">📡 Statcast</button>
      <button class="btn-settings" onclick="openGhSettings()" title="GitHub Actions settings">⚙</button>
      <button class="btn-refresh" id="refresh-btn" onclick="refreshData()">↻ <span data-i18n="btnRefresh">更新</span></button>
      <button id="langBtn" onclick="toggleLang()">EN</button>
    </div>
  </div>
  <nav class="tab-nav">
    <button class="tab-btn active" id="tab-batting" onclick="switchTab('batting')">🏏 <span data-i18n="tabBatting">打者</span></button>
    <button class="tab-btn" id="tab-pitching" onclick="switchTab('pitching')">⚾ <span data-i18n="tabPitching">投手</span></button>
    <button class="tab-btn" id="tab-players" onclick="switchTab('players')">👤 <span data-i18n="tabPlayers">選手</span></button>
  </nav>
</header>

<main class="app-content">

  <!-- BATTING -->
  <div class="tab-panel active" id="panel-batting">
    <div class="period-selector">
      <button class="period-btn" data-period="1w" onclick="switchPeriod('1w')" data-i18n="period1W">直近1週間</button>
      <button class="period-btn" data-period="1m" onclick="switchPeriod('1m')" data-i18n="period1M">直近1か月</button>
      <button class="period-btn active" data-period="season" onclick="switchPeriod('season')" data-i18n="periodSeason">今季全体</button>
    </div>
    <div id="batting-overview" style="padding-top:12px"></div>
    <div id="batting-filter"></div>
    <div class="batting-charts-section" style="padding-top:12px">
      <div id="batting-charts"></div>
    </div>
  </div>

  <!-- PITCHING -->
  <div class="tab-panel" id="panel-pitching">
    <div class="period-selector">
      <button class="period-btn" data-period="1w" onclick="switchPeriod('1w')" data-i18n="period1W">直近1週間</button>
      <button class="period-btn" data-period="1m" onclick="switchPeriod('1m')" data-i18n="period1M">直近1か月</button>
      <button class="period-btn active" data-period="season" onclick="switchPeriod('season')" data-i18n="periodSeason">今季全体</button>
    </div>
    <div id="pitching-overview" style="padding-top:12px"></div>
    <div id="pitching-filter"></div>
    <div class="pitching-charts-section" style="padding-top:12px">
      <div id="pitching-charts"></div>
    </div>
  </div>

  <!-- PLAYERS -->
  <div class="tab-panel" id="panel-players"></div>

</main>

<script src="src/i18n.js"></script>
<script src="src/mlb-api.js"></script>
<script src="src/charts.js"></script>
<script src="src/app.js"></script>
</body>
</html>

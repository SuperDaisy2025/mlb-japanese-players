name: Fetch Statcast Data

on:
  # 毎日午前8時（JST = UTC+9）に自動実行
  schedule:
    - cron: '0 23 * * *'
  # 手動トリガー（PWAのボタンから呼び出し可能）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pybaseball pandas numpy

      - name: Fetch Statcast data
        run: python scripts/fetch_statcast.py

      - name: Commit and push data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "📊 Update Statcast data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
